version: "3.8"
services:
  aiyu-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LLM_PROVIDER=mock
      - QUEUE_CONCURRENCY=5
      - QUEUE_MAX=100
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');const r=h.request('http://localhost:3000/health',res=>process.exit(res.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(3000,()=>{r.destroy();process.exit(1)});r.end()"]
      interval: 10s
      timeout: 5s
      retries: 3

  aiyu-dashboard:
    build: ../aiyu-multi-agent-dashboard
    ports:
      - "3001:3000"
    environment:
      - AIYU_WS_URL=ws://aiyu-api:3000/ws
      - AIYU_API_URL=http://aiyu-api:3000
    depends_on:
      aiyu-api:
        condition: service_healthy
